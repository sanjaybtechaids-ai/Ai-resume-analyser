<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>AI Resume Analyzer</h1>
        <p style="font-family: 'Courier New', Courier, monospace;">Upload your resume to check company eligibility, salary range, improvements, and receive a motivating quote.</p>
        <div>
            <input type="file" id="resumeUpload" accept=".txt,.pdf,.doc,.docx"><br><br>
            <button onclick="analyzeResume()" class="btn">Analyze Resume</button>
            <button onclick="clearResume()" class="btn" style="background: #f44336; margin-left: 10px;">Clear</button>
        </div>
        <div id="output" class="output-box"></div>
    </div>

    <script src="server.js"></script>
</body>
</html>
